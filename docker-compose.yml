services:
  postgres:
    image: postgres:15-alpine
    container_name: grocery-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grocery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - grocery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: grocery-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/grocery_db?schema=public
      JWT_SECRET: your-super-secret-key
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin@123456
      ADMIN_NAME: Super Admin
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grocery-network
    restart: "no" 

volumes:
  postgres_data:

networks:
  grocery-network:
    driver: bridge